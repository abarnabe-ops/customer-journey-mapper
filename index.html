<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<title>Customer Journey Mapper v65</title>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  #auth-overlay {
    position: fixed; inset: 0; background: #0F172A;
    display: flex; align-items: center; justify-content: center;
    z-index: 9999; font-family: 'Inter', system-ui, sans-serif;
  }
  .auth-box {
    background: #1E293B; border: 1px solid #334155; border-radius: 16px;
    padding: 40px; width: 380px; box-shadow: 0 24px 80px rgba(0,0,0,.6);
  }
  .auth-logo { text-align: center; margin-bottom: 24px; }
  .auth-logo img { height: 44px; }
  .auth-title { color: #F1F5F9; font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 6px; }
  .auth-sub { color: #64748B; font-size: 13px; text-align: center; margin-bottom: 28px; }
  .auth-label { display: block; color: #94A3B8; font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .auth-input { width: 100%; background: #0F172A; border: 1px solid #334155; color: #F1F5F9;
    padding: 10px 12px; border-radius: 8px; font-size: 14px; outline: none;
    box-sizing: border-box; font-family: inherit; margin-bottom: 16px; }
  .auth-input:focus { border-color: #3B82F6; }
  .auth-btn { width: 100%; background: linear-gradient(135deg,#2563EB,#1E40AF); border: none;
    color: #fff; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: inherit; }
  .auth-btn:disabled { opacity: .5; cursor: not-allowed; }
  .auth-msg { margin-top: 14px; padding: 10px 14px; border-radius: 8px; font-size: 12px;
    font-weight: 600; text-align: center; display: none; }
  .auth-msg.ok { background: #14532D; color: #4ADE80; display: block; }
  .auth-msg.err { background: #7F1D1D; color: #FCA5A5; display: block; }
  .auth-footer { margin-top: 20px; text-align: center; color: #475569; font-size: 11px; }
  #app-root { display: none; height: 100vh; }
</style>
<style>*{margin:0;padding:0;box-sizing:border-box;}html,body,#root{width:100%;height:100%;overflow:hidden;}@keyframes spin{to{transform:rotate(360deg);}}</style>

<script>
(async () => {
  const SUPA_URL = 'https://fryywsftyzruirmutgwp.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZyeXl3c2Z0eXpydWlybXV0Z3dwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0Njk1MTUsImV4cCI6MjA5ODA0NTUxNX0.3PcJLk1EpTnxuVbV4cI9qC0I0a9sQGBIby6VbOKGbf8';
  const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);

  // ── Supabase storage polyfill (replaces window.storage) ──────────────
  window.storage = {
    async _uid() {
      const { data } = await sb.auth.getUser();
      return data?.user?.id;
    },
    async get(key, shared) {
      const uid = await this._uid();
      if (!uid) return null;
      const { data } = await sb.from('storage_kv')
        .select('value').eq('key', key).eq('user_id', uid).maybeSingle();
      return data ? { key, value: data.value } : null;
    },
    async set(key, value, shared) {
      const uid = await this._uid();
      if (!uid) return null;
      const { error } = await sb.from('storage_kv')
        .upsert({ key, value, user_id: uid, updated_at: new Date().toISOString() },
                { onConflict: 'user_id,key' });
      return error ? null : { key, value };
    },
    async delete(key, shared) {
      const uid = await this._uid();
      if (!uid) return null;
      await sb.from('storage_kv').delete().eq('key', key).eq('user_id', uid);
      return { key, deleted: true };
    },
    async list(prefix, shared) {
      const uid = await this._uid();
      if (!uid) return { keys: [] };
      let q = sb.from('storage_kv').select('key').eq('user_id', uid);
      if (prefix) q = q.like('key', prefix + '%');
      const { data } = await q;
      return { keys: (data || []).map(r => r.key) };
    }
  };

  // ── Auth helpers ──────────────────────────────────────────────────────
  const overlay  = document.getElementById('auth-overlay');
  const appRoot  = document.getElementById('app-root');
  const emailIn  = document.getElementById('auth-email');
  const authBtn  = document.getElementById('auth-btn');
  const authMsg  = document.getElementById('auth-msg');

  function showMsg(type, text) {
    authMsg.className = 'auth-msg ' + type;
    authMsg.textContent = text;
  }

  function showApp(user) {
    overlay.style.display = 'none';
    appRoot.style.display = 'block';
    // Inject user email badge in topbar after React mounts
    setTimeout(() => {
      const topbar = document.querySelector('[style*="height:46px"]');
      if (topbar) {
        const badge = document.createElement('div');
        badge.style.cssText = 'color:#64748B;font-size:11px;margin-left:8px;display:flex;align-items:center;gap:6px;';
        badge.innerHTML = `<span style="color:#4ADE80;">●</span> ${user.email} <button onclick="window._sbSignOut()" style="background:#334155;border:none;color:#94A3B8;padding:2px 8px;border-radius:4px;cursor:pointer;font-size:10px;font-family:inherit;">Déconnexion</button>`;
        topbar.appendChild(badge);
      }
    }, 1500);
  }

  window._sbSignOut = async () => {
    await sb.auth.signOut();
    location.reload();
  };

  // Check existing session
  const { data: { session } } = await sb.auth.getSession();
  if (session?.user) {
    showApp(session.user);
    return;
  }

  // Listen for auth state changes (magic link callback)
  sb.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN' && session?.user) {
      showApp(session.user);
    }
  });

  // Login button
  authBtn.addEventListener('click', async () => {
    const email = emailIn.value.trim();
    if (!email || !email.includes('@')) {
      showMsg('err', 'Entrez une adresse email valide');
      return;
    }
    authBtn.disabled = true;
    authBtn.textContent = 'Envoi en cours...';
    const { error } = await sb.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: location.href }
    });
    if (error) {
      showMsg('err', 'Erreur : ' + error.message);
      authBtn.disabled = false;
      authBtn.textContent = 'Envoyer le lien de connexion';
    } else {
      showMsg('ok', '✓ Lien envoyé ! Vérifiez votre boîte mail.');
      authBtn.textContent = 'Lien envoyé ✓';
    }
  });

  emailIn.addEventListener('keydown', e => { if (e.key === 'Enter') authBtn.click(); });
})();
</script>
