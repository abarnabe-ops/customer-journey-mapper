# .github/workflows/claude.yml
#
# Plain-language summary:
#   When a person writes "@claude ..." in a GitHub Issue or Pull Request, Claude wakes up
#   inside GitHub, reads this repo (and your CLAUDE.md + skills), makes the change on a new
#   branch, and opens a Pull Request for you to review. It runs on GitHub's own computers,
#   so there is nothing for you to host.
#
#   It signs in with your Pro/Max subscription token (the CLAUDE_CODE_OAUTH_TOKEN secret),
#   so there is no extra bill. Do NOT add an ANTHROPIC_API_KEY secret, or it switches to
#   paid pay-per-token billing.
#
#   IMPORTANT: commit this file to your DEFAULT branch (usually `main`). GitHub reads
#   Issue-triggered workflows from the default branch, so it must live there to respond.

name: Claude

on:
  issues:
    types: [opened, assigned, labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Only run when a real person mentions @claude — never react to bots (including itself).
    if: >
      github.actor != 'claude[bot]' &&
      github.actor != 'github-actions[bot]' &&
      (
        (github.event_name == 'issues' && (contains(github.event.issue.title, '@claude') || contains(github.event.issue.body, '@claude'))) ||
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
