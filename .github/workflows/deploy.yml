name: Deploy

# Two environments, one source repo:
#   - push to `main`    -> build (production config) -> e2e gate -> deploy to THIS
#     repo's GitHub Pages via the official actions/deploy-pages (Pages source =
#     "GitHub Actions"). This avoids the "deploy from a branch" auto-detection
#     that kept resetting the Pages source to main and 404'ing production.
#   - push to `staging` -> build (staging config) -> e2e gate -> deploy to the
#     SEPARATE staging repo (customer-journey-mapper-staging) via SSH deploy key
#     (cross-repo, so it must use the branch method) -> smoke-test staging URL.
# Promotion path: merge `staging` -> `main`.

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:

# Permissions needed by actions/deploy-pages (pages: write, id-token: write).
# contents: write is needed for the staging cross-repo push + diagnostics branch.
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deploy per ref.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-test:
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.env.outputs.name }}
      base: ${{ steps.env.outputs.base }}
      url: ${{ steps.env.outputs.url }}
      bundle: ${{ steps.bundle.outputs.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Resolve environment
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/staging" ]; then
            echo "name=staging" >> "$GITHUB_OUTPUT"
            echo "base=/customer-journey-mapper-staging/" >> "$GITHUB_OUTPUT"
            echo "url=https://abarnabe-ops.github.io/customer-journey-mapper-staging/" >> "$GITHUB_OUTPUT"
            echo "supabase_url=${{ secrets.STAGING_SUPABASE_URL }}" >> "$GITHUB_OUTPUT"
            echo "supabase_key=${{ secrets.STAGING_SUPABASE_ANON_KEY }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=production" >> "$GITHUB_OUTPUT"
            echo "base=/customer-journey-mapper/" >> "$GITHUB_OUTPUT"
            echo "url=https://abarnabe-ops.github.io/customer-journey-mapper/" >> "$GITHUB_OUTPUT"
            echo "supabase_url=${{ secrets.VITE_SUPABASE_URL }}" >> "$GITHUB_OUTPUT"
            echo "supabase_key=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        env:
          VITE_BASE: ${{ steps.env.outputs.base }}
          VITE_APP_ENV: ${{ steps.env.outputs.name }}
          VITE_SUPABASE_URL: ${{ steps.env.outputs.supabase_url }}
          VITE_SUPABASE_ANON_KEY: ${{ steps.env.outputs.supabase_key }}
        run: npm run build

      - name: Verify build output
        env:
          EXPECTED_BASE: ${{ steps.env.outputs.base }}
        run: |
          set -e
          echo "Checking dist/ output for ${{ steps.env.outputs.name }}..."
          test -f dist/index.html || { echo "::error::dist/index.html is missing"; exit 1; }
          if grep -q "main.tsx" dist/index.html; then
            echo "::error::dist/index.html references main.tsx - build did not transform the entry"; exit 1
          fi
          if ! grep -qE 'assets/index-[A-Za-z0-9_-]+\.js' dist/index.html; then
            echo "::error::dist/index.html does not reference a hashed JS bundle"; exit 1
          fi
          if ! grep -q "src=\"${EXPECTED_BASE}assets/index-" dist/index.html; then
            echo "::error::bundle path does not use expected base ${EXPECTED_BASE}"; exit 1
          fi
          BUNDLE=$(grep -oE 'assets/index-[A-Za-z0-9_-]+\.js' dist/index.html | head -1)
          test -f "dist/$BUNDLE" || { echo "::error::referenced bundle dist/$BUNDLE not found"; exit 1; }
          SIZE=$(wc -c < "dist/$BUNDLE")
          echo "Bundle: $BUNDLE ($SIZE bytes)"
          test "$SIZE" -gt 50000 || { echo "::error::bundle suspiciously small ($SIZE bytes)"; exit 1; }
          test -f dist/favicon.ico || { echo "::error::dist/favicon.ico is missing"; exit 1; }
          test -f dist/apple-touch-icon.png || { echo "::error::dist/apple-touch-icon.png is missing"; exit 1; }
          echo "Build output looks good."

      - name: Capture bundle hash
        id: bundle
        run: echo "name=$(grep -oE 'assets/index-[A-Za-z0-9_-]+\.js' dist/index.html | head -1)" >> "$GITHUB_OUTPUT"

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (blocks deploy on failure)
        env:
          VITE_BASE: ${{ steps.env.outputs.base }}
        run: npm run test:e2e

      - name: Publish failure diagnostics
        if: failure()
        run: |
          set +e
          mkdir -p /tmp/diag
          SUMMARY=/tmp/diag/ci-failure-${{ steps.env.outputs.name }}.txt
          {
            echo "Run: ${{ github.run_id }}  Branch: ${{ github.ref_name }}  $(date -u)"
            echo "Commit: ${{ github.sha }}"
            echo "==================================================================="
            if [ -f e2e-results.json ]; then
              node -e '
                const r=require("./e2e-results.json");
                const out=[];
                function walk(suite,prefix){
                  (suite.suites||[]).forEach(s=>walk(s,prefix+" > "+(s.title||"")));
                  (suite.specs||[]).forEach(spec=>{
                    (spec.tests||[]).forEach(t=>{
                      const res=t.results[t.results.length-1];
                      if(res && res.status!=="passed" && res.status!=="skipped"){
                        out.push("FAILED: "+prefix+" > "+spec.title);
                        (res.errors||[]).forEach(e=>out.push("  "+String(e.message||"").split("\n").slice(0,15).join("\n  ")));
                        if(!res.errors||!res.errors.length) out.push("  status="+res.status);
                        out.push("");
                      }
                    });
                  });
                }
                (r.suites||[]).forEach(s=>walk(s,s.title||""));
                console.log(out.join("\n") || "No failed specs parsed (suite-level error?)");
              ' 2>&1
            else
              echo "e2e-results.json not produced — failure happened before the test run."
            fi
          } > "$SUMMARY" 2>&1
          git config user.name "CI"
          git config user.email "ci@leadfox.co"
          git checkout --orphan ci-diagnostics
          git reset --hard >/dev/null 2>&1
          cp "$SUMMARY" ./ci-failure.txt
          git add -f ci-failure.txt
          git commit -m "ci: ${{ steps.env.outputs.name }} e2e failure (run ${{ github.run_id }})" >/dev/null 2>&1
          git push -f origin ci-diagnostics >/dev/null 2>&1 && echo "diagnostics pushed" || echo "push failed"

      # Upload the build for the production Pages deploy job (main only).
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      # Staging deploys cross-repo via deploy key (branch method required).
      - name: Deploy to staging repo
        if: github.ref == 'refs/heads/staging'
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          external_repository: abarnabe-ops/customer-journey-mapper-staging
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: false

  # Production deploy via the official GitHub Pages Actions flow (main only).
  # This is what removes the branch-source auto-revert problem.
  deploy-production:
    if: github.ref == 'refs/heads/main'
    needs: build-test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Smoke-test the live site after deploy. Runs when the build/test job passed.
  # On main it waits for deploy-production; on staging that job is skipped (the
  # staging deploy happened inside build-test), so we tolerate the skip.
  smoke-test:
    if: ${{ always() && needs.build-test.result == 'success' && (needs.deploy-production.result == 'success' || needs.deploy-production.result == 'skipped') }}
    needs: [build-test, deploy-production]
    runs-on: ubuntu-latest
    steps:
      - name: Smoke test live site
        env:
          URL: ${{ needs.build-test.outputs.url }}
          EXPECTED_BUNDLE: ${{ needs.build-test.outputs.bundle }}
        run: |
          set -e
          echo "Smoke-testing ${{ needs.build-test.outputs.env_name }} at $URL"
          echo "Expecting live site to serve: $EXPECTED_BUNDLE"
          OK=0
          for i in $(seq 1 20); do
            HTML=$(curl -fsSL "${URL}?cb=$(date +%s)" || true)
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "${URL}?cb=$(date +%s)" || echo "000")
            if [ "$CODE" = "200" ] && echo "$HTML" | grep -q "$EXPECTED_BUNDLE"; then
              echo "Live HTML up to date (attempt $i): serves $EXPECTED_BUNDLE"
              if echo "$HTML" | grep -q "main.tsx"; then
                echo "::error::Live site references main.tsx - wrong index.html served"; exit 1
              fi
              JS_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${URL}${EXPECTED_BUNDLE}" || echo "000")
              test "$JS_CODE" = "200" || { echo "::error::bundle returned HTTP $JS_CODE"; exit 1; }
              echo "Bundle loads (HTTP $JS_CODE)"
              ICO_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${URL}favicon.ico" || echo "000")
              test "$ICO_CODE" = "200" || { echo "::error::favicon.ico returned HTTP $ICO_CODE"; exit 1; }
              echo "Favicon loads (HTTP $ICO_CODE)"
              OK=1; break
            fi
            echo "Attempt $i: not ready (HTTP $CODE), retrying in 15s..."
            sleep 15
          done
          if [ "$OK" != "1" ]; then
            echo "::error::Live site did not serve the new build ($EXPECTED_BUNDLE) after ~5 min."
            exit 1
          fi
          echo "Smoke test passed - ${{ needs.build-test.outputs.env_name }} is healthy."
