name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main        # production deploys from main
      - v2-react    # preview deploys from v2-react (to gh-pages-v2 branch)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      # Deploy main branch → production GitHub Pages (gh-pages branch)
      - name: Deploy to GitHub Pages (production)
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: false

      # Deploy v2-react branch → preview (gh-pages-v2 branch)
      - name: Deploy preview (v2-react branch)
        if: github.ref == 'refs/heads/v2-react'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages-v2
          force_orphan: false
